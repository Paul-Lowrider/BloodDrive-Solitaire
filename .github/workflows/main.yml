<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blood Drive – Solitaire</title>
<style>
  body {
    margin: 0;
    background: #123a24;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  #game {
    padding: 16px;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 8px;
  }
  .row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
 .pile {
  border-radius: 8px;
  border: 2px solid transparent; /* keeps layout stable */
  padding: 8px;
  min-width: 240px;
  min-height: 340px;
  position: relative;
}

#hint-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: #888;
  color: white;
  font-size: 20px;
  cursor: pointer;
  margin-left: 50px;
  transition: background 0.2s ease;
}

#hint-btn.off {
  background: #444;
}

.highlight-legal {
  outline: 4px solid yellow;
  border-radius: 6px;
}
if (state.gameOver && !msg.toLowerCase().includes("game over")) {
  return;
}


#status {
  white-space: pre-line; /* allows \n line breaks */
  font-size: 36px;
  margin-top: 20px;
  margin-left: 15px;
  min-height: 40px;
  font-weight: bold;
  
  }
}

.fade-out {
  opacity: 0;
  transition: opacity 1s ease;
}

  .pile-title {
    font-size: 24px;   /* or whatever size you want */
    opacity: 0.8;
    margin-bottom: 4px;
    text-align: left;
    width: 100%;
  }

  /* Need cards doubled in size */
  .card-img {
    width: 202px;
    height: 270px;
    border-radius: 8px;
    border: 1px solid #222;
    object-fit: cover;
    display: block;
    margin-bottom: 6px;
  }

.highlight-legal {
  outline: 4px solid gold;
  box-shadow: 0 0 12px gold;
  border-radius: 8px;
  z-index: 10;
  position: relative;
}



  /* Donor thumbnails scaled up to match */
  .donor-small {
    width: 90px;
    height: 120px;
    border-radius: 6px;
    border: 1px solid #222;
    object-fit: cover;
    margin: 2px;
  }

  .visible {
    outline: 3px solid yellow;
  }
button {
  padding: 10px 20px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(150, 30, 45, 0.55); /* deep red with transparency */
  backdrop-filter: blur(10px);
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease;
}

button:hover {
  background: rgba(255, 182, 193, 0.70); /* deeper rose on hover */
  transform: scale(1.03);
}

  button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  #status {
    font-size: 36px;
    opacity: 0.9;
  }

  #score {
    font-size: 36px;
    font-weight: bold;
    margin-left: 20px;
  }

#donor-stock-count {
font-size: 24px;
opacity: 0.8;
margin-bottom: 1px
}

  #donor-waste-cards {
    position: relative;
    width: 120px;
    height: 240px;
  }
  .waste-card {
    position: absolute;
    top: 0;
    left: 0;
  }
  .waste-card.hidden {
    opacity: 0;
    pointer-events: none;
  }
@keyframes drawCard {
  from {
    transform: translateY(-20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.draw-animate {
  animation: drawCard 0.5s ease-out;
}
.need-card-container {
  width: 240px;      /* same as card-img width */
  height: 280px;     /* same as card-img height */
  position: relative;
  flex-shrink: 0;    /* prevents resizing */
}

.need-card {
  position: absolute;
  top: 0;
  left: 0;
}
.need-donors {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
  min-height: 130px; /* optional: keeps layout stable */
}

.fade-out {
  animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}
#text-box {
  position: absolute;
  top: 40px;
  right: 160px;
  width: 360px;
  padding: 12px;
  background: #123a26;
  color: #fff;
  border-radius: 8px;
  font-size: 20px;
  line-height: 1.6;
  border: 1px solid rgba(255,255,255,0.2);
  z-index: 9999;
}


</style>
</head>
<body>
<div id="game">

  <div class="row">

    <div id="donor-stock" class="pile">
      <div class="pile-title">Donor Stock</div>
      <img id="donor-stock-back" class="card-img" src="images/back.png" style="opacity:1;">
      <div id="donor-stock-count"></div>
    </div>

    <div id="text-box">
      You are managing a stream of real‑time blood needs as they arrive.<br>
      Each Need represents a patient waiting for a transfusion, and each one has strict compatibility rules.<br><br>
      Your job is to assign the available Donor cards to the Needs as efficiently as possible.<br><br>
      Every Donor you place helps stabilize a patient, and when a Need receives three compatible donors, that patient is cleared and a new Need appears.<br>
      Work quickly, think strategically, and use every donor wisely — lives depend on your decisions.
    </div>

    <div id="donor-waste" class="pile">
      <div class="pile-title">Match one of the stripes <br> to a stripe on a Need card</div>
      <div id="donor-waste-cards" style="display:flex; gap:8px;"></div>
    </div>

 <div class="row" style="flex-direction: column; align-items: flex-start;">
  <button id="flip-btn">Flip 3 Donors</button>

  <button id="hint-btn" style="margin-top: 8px;">Hints: ON</button>

  <div id="score" style="margin-top: 10px;">Score: 0</div>
<div id="status"></div>
</div>



  </div>

  <div class="row">

    <div id="need-0" class="pile need-pile">
      <div class="pile-title">Need 1</div>
      <div class="need-card-container">
        <div class="need-card"></div>
      </div>
      <div class="need-donors"></div>
    </div>

    <div id="need-1" class="pile need-pile">
      <div class="pile-title">Need 2</div>
      <div class="need-card-container">
        <div class="need-card"></div>
      </div>
      <div class="need-donors"></div>
    </div>

    <div id="need-2" class="pile need-pile">
      <div class="pile-title">Need 3</div>
      <div class="need-card-container">
        <div class="need-card"></div>
      </div>
      <div class="need-donors"></div>
    </div>
<div id="status"></div>
  </div>

  

</div>


<script>
// ---------- EMBEDDED IMAGES ----------
// Replace each REPLACE_WITH_BASE64_... with your actual Base64 strings
const EMBEDDED_IMAGES = {
  "A_plus": "data:image/png;base64,",
  "A_minus": "data:image/png;base64,",
  "B_plus": "data:image/png;base64,",
  "B_minus": "data:image/png;base64,",
  "AB_plus": "data:image/png;base64,",
  "AB_minus": "data:image/png;base64,",
  "O_plus": "data:image/png;base64,",

  "Donor_A_plus": "data:image/png;base64,",
  "Donor_A_minus": "data:image/png;base64,",
  "Donor_B_plus": "data:image/png;base64,",
  "Donor_B_minus": "data:image/png;base64,",
  "Donor_AB_plus": "data:image/png;base64,",
  "Donor_AB_neg": "data:image/png;base64,",
  "Donor_O_plus": "data:image/png;base64,",
  "Donor_O_minus": "data:image/png;base64,",

  "back": "data:image/png;base64,"
};

// ---------- TYPES & DATA ----------

const NEED_TYPES = [
  "A_plus",
  "A_minus",
  "B_plus",
  "B_minus",
  "AB_plus",
  "AB_minus",
  "O_plus"
];

const DONOR_TYPES = [
  "Donor_A_plus",
  "Donor_A_minus",
  "Donor_B_plus",
  "Donor_B_minus",
  "Donor_AB_plus",
  "Donor_AB_neg",
  "Donor_O_plus",
  "Donor_O_minus"
];

// Per-card donor counts
const DONOR_COUNTS = {
  Donor_A_plus: 18,
  Donor_A_minus: 9,
  Donor_B_plus: 10,
  Donor_B_minus: 3,
  Donor_AB_plus: 6,
  Donor_AB_neg: 2,
  Donor_O_plus: 18,
  Donor_O_minus: 9
};

// Compatibility rules
const CHAIN = {
  A_plus:   ["Donor_A_plus", "Donor_A_minus", "Donor_O_plus", "Donor_O_minus"],
  A_minus:  ["Donor_A_minus", "Donor_O_minus"],

  B_plus:   ["Donor_B_plus", "Donor_B_minus", "Donor_O_plus", "Donor_O_minus"],
  B_minus:  ["Donor_B_minus", "Donor_O_minus"],

  AB_plus:  ["Donor_A_plus", "Donor_A_minus", "Donor_B_plus", "Donor_B_minus", "Donor_AB_plus", "Donor_AB_neg", "Donor_O_plus", "Donor_O_minus"],
  AB_minus: ["Donor_A_minus", "Donor_B_minus", "Donor_AB_neg", "Donor_O_minus"],

  O_plus:   ["Donor_O_plus", "Donor_O_minus"]
};

// ---------- UTILITIES ----------

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---------- STATE ----------

const state = {
  needDeck: [],
  donorStock: [],
  donorWaste: [],
  needs: [null, null, null],
  needDonors: [[], [], []],
  satisfiedCount: 0,
  score: 0,
  totalNeeds: 14,
  hintsOn: true,
  gameOver: false
};

let statusTimeout = null;

// ---------- STATUS ----------

function setStatus(msg) {
  const statusEl = document.getElementById("status");

  if (state.gameOver && !msg.toLowerCase().includes("game over")) return;

  statusEl.classList.remove("fade-out");
  statusEl.style.opacity = 1;
  statusEl.innerHTML = msg;

  if (statusTimeout) clearTimeout(statusTimeout);
  if (msg.toLowerCase().includes("game over")) return;

  statusTimeout = setTimeout(() => {
    statusEl.classList.add("fade-out");
  }, 1000);
}

function updateScore() {
  document.getElementById("score").textContent =
    `Score: ${state.score} / ${state.totalNeeds}`;
}

// ---------- DECK CREATION ----------

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function createNeedDeck() {
  const deck = [];
  NEED_TYPES.forEach(type => {
    for (let i = 0; i < 2; i++) deck.push({ type });
  });
  return shuffle(deck);
}

function createDonorDeck() {
  const deck = [];
  DONOR_TYPES.forEach(type => {
    const count = DONOR_COUNTS[type] || 0;
    for (let i = 0; i < count; i++) deck.push({ type });
  });
  return shuffle(deck);
}

// ---------- NEED DRAWING ----------

function drawNextNeed() {
  if (state.needDeck.length === 0) return null;
  return state.needDeck.pop();
}

function drawNeedIntoSlot(slot) {
  const newNeed = drawNextNeed();
  state.needs[slot] = newNeed;
}

// ---------- GAME SETUP ----------

function dealInitialNeeds() {
  for (let i = 0; i < 3; i++) drawNeedIntoSlot(i);
}

function startGame() {
  state.needDeck = createNeedDeck();
  state.donorStock = createDonorDeck();
  state.donorWaste = [];
  state.needs = [null, null, null];
  state.needDonors = [[], [], []];
  state.satisfiedCount = 0;
  state.score = 0;
  state.gameOver = false;

  updateScore();
  dealInitialNeeds();
  render();
  setStatus("Game started");
}

// ---------- RULES ----------

function canDonorSatisfyNeed(donor, need) {
  if (!donor || !need) return false;
  return CHAIN[need.type].includes(donor.type);
}

function getVisibleDonor() {
  if (state.donorWaste.length === 0) return null;
  return state.donorWaste[state.donorWaste.length - 1];
}

function noLegalMovesRemain() {
  const donor = getVisibleDonor();
  if (!donor) return true;

  for (let i = 0; i < 3; i++) {
    const need = state.needs[i];
    if (!need) continue;
    if (canDonorSatisfyNeed(donor, need)) return false;
  }
  return true;
}

// ---------- HINTS ----------

function runHints() {
  if (state.hintsOn) highlightLegalPlacements();
}

function highlightLegalPlacements() {
  const donor = getVisibleDonor();
  if (!donor) return;

  for (let i = 0; i < 3; i++) {
    const need = state.needs[i];
    if (!need) continue;

    const img = document
      .getElementById(`need-${i}`)
      .querySelector(".need-card img");

    if (img && canDonorSatisfyNeed(donor, need)) {
      img.classList.add("highlight-legal");
    }
  }
}

function clearHighlights() {
  for (let i = 0; i < 3; i++) {
    const img = document
      .getElementById(`need-${i}`)
      .querySelector(".need-card img");

    if (img) img.classList.remove("highlight-legal");
  }
}

// ---------- DONOR FLIP ----------

function flipThreeDonors() {
  const count = Math.min(3, state.donorStock.length);
  for (let i = 0; i < count; i++) {
    const card = state.donorStock.pop();
    state.donorWaste.push(card);
  }

  render();
  runHints();

  if (state.donorStock.length === 0 && noLegalMovesRemain()) {
    state.gameOver = true;
    setStatus("Game Over<br>- no more moves");
  }
}

// ---------- ACTIONS ----------

async function tryPlaceVisibleDonorOnNeed(slot) {

  if (state.gameOver) return;

  const donor = getVisibleDonor();
  const need = state.needs[slot];
  if (!donor || !need) return;

  if (!canDonorSatisfyNeed(donor, need)) {
    setStatus("Incompatible donor.");
    return;
  }

  state.donorWaste.pop();
  state.needDonors[slot].push(donor);

  if (state.needDonors[slot].length === 3) {

    state.needs[slot] = null;
    state.needDonors[slot] = [];
    state.satisfiedCount++;
    state.score++;
    updateScore();

    if (state.satisfiedCount >= state.totalNeeds) {
      state.gameOver = true;
      setStatus("Game Over<br>- all Needs satisfied!");
      clearHighlights();
      render();
      return;
    }

    render();

    await new Promise(res => setTimeout(res, 250));

    drawNeedIntoSlot(slot);

    render();
    setStatus("Need satisfied.");
    clearHighlights();
    runHints();

    if (state.donorStock.length === 0 && noLegalMovesRemain()) {
      state.gameOver = true;
      setStatus("Game Over<br>- no more moves");
    }
    return;
  }

  clearHighlights();
  render();
  runHints();

  if (state.donorStock.length === 0 && noLegalMovesRemain()) {
    state.gameOver = true;
    setStatus("Game Over<br>- no more moves");
  }
}

// ---------- RENDER ----------

function render() {
  document.getElementById("donor-stock-count").textContent =
    `${state.donorStock.length} cards left`;

  const wasteEl = document.getElementById("donor-waste-cards");
  wasteEl.innerHTML = "";
  state.donorWaste.forEach((card, idx) => {
    const img = document.createElement("img");
    img.src = EMBEDDED_IMAGES[card.type];
    img.className = "card-img waste-card";
    img.style.opacity = 1;

    if (idx !== state.donorWaste.length - 1) {
      img.classList.add("hidden");
    } else {
      img.classList.add("visible");
    }
    wasteEl.appendChild(img);
  });

  for (let i = 0; i < 3; i++) {
    const pileEl = document.getElementById(`need-${i}`);
    const needCardEl = pileEl.querySelector(".need-card");
    const donorsEl = pileEl.querySelector(".need-donors");

    needCardEl.innerHTML = "";
    donorsEl.innerHTML = "";

    const need = state.needs[i];
    if (need) {
      const img = document.createElement("img");
      img.src = EMBEDDED_IMAGES[need.type];
      img.className = "card-img";
      needCardEl.appendChild(img);

      state.needDonors[i].forEach(d => {
        const dImg = document.createElement("img");
        dImg.src = EMBEDDED_IMAGES[d.type];
        dImg.className = "donor-small";
        donorsEl.appendChild(dImg);
      });
    }
  }

  document.getElementById("flip-btn").disabled =
    (state.donorStock.length === 0);
}

// ---------- EVENT HOOKUP ----------

document.getElementById("flip-btn").addEventListener("click", flipThreeDonors);

document.getElementById("hint-btn").addEventListener("click", () => {
  state.hintsOn = !state.hintsOn;

  const btn = document.getElementById("hint-btn");
  if (state.hintsOn) {
    btn.textContent = "Hints: ON";
    btn.classList.remove("off");
    runHints();
  } else {
    btn.textContent = "Hints: OFF";
    btn.classList.add("off");
    clearHighlights();
  }
});

for (let i = 0; i < 3; i++) {
  document.getElementById(`need-${i}`).addEventListener("click", () => {
    tryPlaceVisibleDonorOnNeed(i);
  });
}

// ---------- START ----------
startGame();
</script>
